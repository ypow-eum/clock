<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Mobile Clock</title>
    <!-- 구글 웹폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Caveat:wght@700&family=Nunito:wght@800&family=Orbitron:wght@700&family=Playfair+Display:ital,wght@1,700&family=Space+Mono:ital,wght@1,700&family=VT323&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        background-color: #000000;
        color: #ffffff;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
      }

      .clock-container {
        text-align: center;
        position: relative;
        top: -20px;
      }

      .time {
        font-size: min(30vw, 45vh, 200px);
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: 0em;
        font-variant-numeric: tabular-nums;
        cursor: pointer;
        padding: 10px 20px;
        white-space: nowrap;
      }

      .blink {
        font-size: 90px;
        border-radius: 50%;
        padding: 0px 15px 0px 15px;
        position: relative;
        opacity: 0.5;
        top: -25px;
      }

      .seconds {
        font-size: min(12vw, 18vh, 70px);
        font-weight: 600;
        color: #888888;
        margin-left: 15px;
        display: inline-block;
        width: 1.6em;
        text-align: left;
        box-sizing: content-box;
        padding-right: 15px;
        padding-bottom: 5px;
      }

      .info-row {
        margin-top: 20px;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 15px;
      }

      .weather,
      .aqi {
        font-size: min(5vw, 25px);
        font-weight: 400;
        display: none;
      }
      .weather {
        color: #dddddd;
      }
      .aqi {
        color: #aaaaaa;
      }

      .status {
        margin-top: 15px;
        font-size: 15px;
        color: #666666;
      }

      /* 컨트롤 버튼 공통 (언어 & 잠금) */
      .control-btn {
        position: fixed;
        bottom: 20px;
        z-index: 1000;
        font-size: 24px;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        color: white;
        transition: background 0.3s;
      }
      .control-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .lang-btn {
        right: 20px;
      }
      .lock-btn {
        left: 20px;
      }



      /* 숫자 패드 */
      .number-pad-container {
        display: none;
        position: fixed;
        bottom: 0; left: 0; width: 100%; height: auto;
        top: auto;
        background: rgba(0, 0, 0, 0.95);
        z-index: 2000;
        padding: 30px 0;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .pad-display {
        font-size: 50px;
        color: white;
        margin-bottom: 40px;
        height: 60px;
        letter-spacing: 15px;
        font-family: monospace;
      }
      .pad-row {
        display: flex;
        gap: 25px;
        margin-bottom: 25px;
      }
      .pad-btn {
        width: 80px; height: 80px;
        border-radius: 50%;
        border: 2px solid #666;
        background: transparent;
        color: white;
        font-size: 30px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: background 0.2s;
        user-select: none;
      }
      .pad-btn:active { background: #444; }
      .pad-btn.action { font-size: 20px; border-color: #888; }

      @media (orientation: landscape) {
        .number-pad-container {
          height: 100%; top: 0; bottom: auto;
          border-radius: 0; padding: 10px 0;
        }
        .pad-display {
          margin-bottom: 10px; font-size: 30px; height: 40px;
        }
        .pad-row {
          gap: 20px; margin-bottom: 10px;
        }
        .pad-btn {
          width: 50px; height: 50px; font-size: 20px;
        }
      }

      #main-content {
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
      }

      @keyframes pad-error-blink {
        0%, 100% { background: rgba(0, 0, 0, 0.95); }
        50% { background: rgba(255, 0, 0, 0.5); }
      }
      @keyframes pad-shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
      }
      .pad-error {
        animation: pad-error-blink 0.3s ease-in-out, pad-shake 0.3s ease-in-out;
      }

      /* 오버레이 */
      .overlay {
        display: none; position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        justify-content: center; align-items: center;
      }
      #gifOverlay {
        background: #000; z-index: 3000;
      }
      #gifOverlay img {
        max-width: 100%; max-height: 100%;
      }
      #fartOverlay {
        background: rgba(0, 0, 0, 0.8); z-index: 4000;
        font-size: 150px; overflow: hidden;
      }
      .rainbow-fart {
        display: inline-block;
        animation: fart-shake 0.1s infinite, rainbow-cycle 0.5s infinite linear;
      }
      @keyframes fart-shake {
        0%, 100% { transform: translate(5px, 5px) scale(1); }
        50% { transform: translate(-5px, -5px) scale(1.2); }
      }
      @keyframes rainbow-cycle {
        0% { filter: hue-rotate(0deg); }
        100% { filter: hue-rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="main-content">
      <div class="clock-container">
        <!-- 시간 표시부 -->
        <div class="time" id="timeContainer">
          <span id="hours" title="누르면 12/24시간제 전환">00</span>
          <!-- <span class="blink">:</span> -->
          <span id="minutes" title="누르면 폰트 크기 변경">00</span>
          <span class="seconds" id="seconds" title="누르면 폰트 변경">00</span>
        </div>

        <div class="info-row">
          <div class="weather" id="weatherDisplay"></div>
          <div class="aqi" id="aqiDisplay"></div>
        </div>
        <div class="status" id="statusDisplay">로딩 중...</div>

        <!-- 컨트롤 버튼 -->
        <button class="control-btn lang-btn" id="langBtn" title="한/영/숨김 모드 전환">🌐</button>
        <button class="control-btn lock-btn" id="lockBtn" title="비밀번호 입력">🔒</button>
      </div>
    </div>

    <!-- 숫자 패드 -->
    <div class="number-pad-container" id="passwordPad">
      <div class="pad-display" id="padDisplay"></div>
      <div class="pad-row">
        <div class="pad-btn" data-num="1">1</div>
        <div class="pad-btn" data-num="2">2</div>
        <div class="pad-btn" data-num="3">3</div>
      </div>
      <div class="pad-row">
        <div class="pad-btn" data-num="4">4</div>
        <div class="pad-btn" data-num="5">5</div>
        <div class="pad-btn" data-num="6">6</div>
      </div>
      <div class="pad-row">
        <div class="pad-btn" data-num="7">7</div>
        <div class="pad-btn" data-num="8">8</div>
        <div class="pad-btn" data-num="9">9</div>
      </div>
      <div class="pad-row">
        <div class="pad-btn action" id="padClear">C</div>
        <div class="pad-btn" data-num="0">0</div>
        <div class="pad-btn action" id="padSubmit">OK</div>
      </div>
      <div class="pad-btn action" id="padClose" style="margin-top: 20px; border: none; font-size: 16px; width: auto; height: auto;">닫기</div>
    </div>

    <!-- 오버레이 및 미디어 -->
    <div class="overlay" id="gifOverlay">
      <img src="0.0.gif" alt="Special Event" />
    </div>
    <div class="overlay" id="fartOverlay">
      <div class="rainbow-fart">🌈💨</div>
    </div>
    <audio id="successSound" src="success.mp3" preload="auto"></audio>

    <script>
      // =========================================================
      // 설정 및 상태 (State & Config)
      // =========================================================
      const AppState = {
        langMode: 0, // 0: 한글, 1: 영문, 2: 안보임
        is12Hour: true,
        currentFontIndex: 0,
        currentSizeIndex: 0,
        weatherData: null,
        aqiData: null,
        currentPassword: ""
      };

      const Config = {
        fonts: [
          '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif',
          '"Orbitron", sans-serif',
          '"VT323", monospace',
          '"Anton", sans-serif',
          '"Nunito", sans-serif',
          '"Caveat", cursive',
          '"Playfair Display", serif'
        ],
        sizes: [
          'min(45vw, 55vh, 300px)',
          'min(40vw, 50vh, 270px)',
          'min(35vw, 45vh, 240px)',
          'min(30vw, 40vh, 210px)',
          'min(25vw, 35vh, 180px)',
          'min(20vw, 30vh, 150px)'
        ],
        timeColors: [
          "#FF80AB", "#EA80FC", "#8C9EFF", "#80D8FF",
          "#A7FFEB", "#CCFF90", "#FFFF8D", "#FFD180"
        ]
      };

      // =========================================================
      // DOM 엘리먼트 (DOM Elements)
      // =========================================================
      const DOM = {
        timeContainer: document.getElementById('timeContainer'),
        hours: document.getElementById('hours'),
        minutes: document.getElementById('minutes'),
        seconds: document.getElementById('seconds'),
        weatherDisplay: document.getElementById('weatherDisplay'),
        aqiDisplay: document.getElementById('aqiDisplay'),
        statusDisplay: document.getElementById('statusDisplay'),
        mainContent: document.getElementById('main-content'),
        passwordPad: document.getElementById('passwordPad'),
        padDisplay: document.getElementById('padDisplay'),
        gifOverlay: document.getElementById('gifOverlay'),
        fartOverlay: document.getElementById('fartOverlay'),
        successSound: document.getElementById('successSound')
      };

      // =========================================================
      // 시계 로직 (Clock Logic)
      // =========================================================
      const updateClock = () => {
        const now = new Date();
        let h = now.getHours();
        let m = now.getMinutes();
        let s = now.getSeconds();

        // 1초마다 색상 변경
        DOM.timeContainer.style.color = Config.timeColors[s % Config.timeColors.length];

        // 12시간제 처리
        if (AppState.is12Hour) {
          h = h % 12 || 12;
        }

        // DOM 업데이트 (2자리 포맷팅)
        DOM.hours.textContent = h.toString().padStart(2, '0');
        DOM.minutes.textContent = m.toString().padStart(2, '0');
        DOM.seconds.textContent = s.toString().padStart(2, '0');


      };

      const startClock = () => {
        updateClock();
        const msToNextSecond = 1000 - new Date().getMilliseconds();
        setTimeout(startClock, msToNextSecond);
      };

      // =========================================================
      // 날씨 및 미세먼지 API 로직 (API Fetching)
      // =========================================================
      const getWeatherIcon = (wmoCode) => {
        if (wmoCode === 0) return "☀️";
        if (wmoCode <= 3) return "⛅";
        if ([45, 48].includes(wmoCode)) return "🌫️";
        if (wmoCode >= 51 && wmoCode <= 67) return "🌧️";
        if (wmoCode >= 71 && wmoCode <= 77) return "❄️";
        if (wmoCode >= 80 && wmoCode <= 82) return "🌦️";
        if (wmoCode >= 85 && wmoCode <= 86) return "🌨️";
        if (wmoCode >= 95 && wmoCode <= 99) return "⛈️";
        return "☁️";
      };

      const renderWeather = () => {
        if (AppState.langMode === 2) {
          DOM.weatherDisplay.style.display = "none";
          DOM.statusDisplay.textContent = "";
          return;
        }
        if (!AppState.weatherData) {
          DOM.statusDisplay.textContent = AppState.langMode === 0 ? "날씨 정보를 읽어오는 중..." : "Loading weather...";
          DOM.weatherDisplay.style.display = "none";
          return;
        }
        if (AppState.weatherData.error) {
          DOM.statusDisplay.textContent = AppState.langMode === 0 ? AppState.weatherData.error.ko : AppState.weatherData.error.en;
          DOM.weatherDisplay.style.display = "none";
          return;
        }

        const { icon, temp } = AppState.weatherData.current;
        DOM.weatherDisplay.textContent = `${icon} ${temp}°C `;
        DOM.weatherDisplay.style.display = "block";
        DOM.statusDisplay.textContent = "";
      };

      const fetchWeather = async (lat, lon) => {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&past_days=1&forecast_days=2`;
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error("HTTP Error");
          const response = await res.json();
          AppState.weatherData = {
            current: {
              icon: getWeatherIcon(response.current_weather.weathercode),
              temp: response.current_weather.temperature
            }
          };
        } catch (e) {
          AppState.weatherData = { error: { ko: "날씨 오류", en: "Weather Error" } };
        }
        renderWeather();
      };

      const updateWeather = () => {
        if ("geolocation" in navigator) {
          navigator.geolocation.getCurrentPosition(
            (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude),
            (err) => {
              console.error("위치 에러:", err);
              AppState.weatherData = { error: { ko: "위치 권한 필요", en: "Location required" } };
              renderWeather();
            }
          );
        } else {
          AppState.weatherData = { error: { ko: "위치 미지원 기기", en: "Location not supported" } };
          renderWeather();
        }
      };

      const renderAQI = () => {
        if (AppState.langMode === 2) {
          DOM.aqiDisplay.style.display = "none";
          return;
        }
        if (!AppState.aqiData) {
          if (!DOM.statusDisplay.textContent) {
            DOM.statusDisplay.textContent = AppState.langMode === 0 ? "미세먼지 정보를 읽어오는 중..." : "Loading AQI...";
          }
          DOM.aqiDisplay.style.display = "none";
          return;
        }
        if (AppState.aqiData.error) {
          DOM.statusDisplay.textContent = AppState.langMode === 0 ? AppState.aqiData.error.ko : AppState.aqiData.error.en;
          DOM.aqiDisplay.style.display = "none";
          return;
        }

        const { current, todayMax } = AppState.aqiData;
        let aqiIcon = "😄";
        if (todayMax > 40) aqiIcon = "😷";
        if (todayMax > 80) aqiIcon = "🤢";
        if (todayMax > 100) aqiIcon = "👿";

        DOM.aqiDisplay.textContent = `😷 ${current} ${aqiIcon} ${todayMax}`;
        DOM.aqiDisplay.style.display = "block";
        DOM.statusDisplay.textContent = "";
      };

      const updateAQI = async () => {
        const token = "c1611aa54ac7de2320cc3105b7b42a0ba2b26447";
        const url = `https://api.waqi.info/feed/here/?token=${token}`;
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error("HTTP Error");
          const response = await res.json();
          if (response.status === "ok") {
            let todayMax = "-";
            if (response.data.forecast?.daily?.pm25) {
              const todayStr = new Date().toISOString().split('T')[0];
              const forecast = response.data.forecast.daily.pm25.find(f => f.day === todayStr);
              if (forecast) todayMax = forecast.max;
            }
            AppState.aqiData = { current: response.data.aqi, todayMax };
          }
        } catch (e) {
          AppState.aqiData = { error: { ko: "미세먼지 오류", en: "AQI Error" } };
        }
        renderAQI();
      };

      // =========================================================
      // 숫자 패드 로직 (Number Pad Logic)
      // =========================================================
      const togglePad = (show) => {
        DOM.passwordPad.style.display = show ? 'flex' : 'none';
        if (show) {
          AppState.currentPassword = "";
          updatePadDisplay();
        }
      };

      const updatePadDisplay = () => {
        DOM.padDisplay.textContent = "•".repeat(AppState.currentPassword.length);
      };

      const inputPad = (num) => {
        if (AppState.currentPassword.length < 4) {
          AppState.currentPassword += num;
          updatePadDisplay();
          if (AppState.currentPassword.length === 4) submitPad();
        }
      };

      const clearPad = () => {
        AppState.currentPassword = "";
        updatePadDisplay();
      };

      const submitPad = () => {
        if (AppState.currentPassword === "1402") {
          DOM.gifOverlay.style.display = 'flex';
          if (DOM.successSound) {
            DOM.successSound.currentTime = 0;
            DOM.successSound.play().catch(e => console.log('Audio error:', e));
          }
          togglePad(false);
          setTimeout(() => DOM.gifOverlay.style.display = 'none', 5000);
        } else {
          DOM.passwordPad.classList.add('pad-error');
          DOM.fartOverlay.style.display = 'flex';
          
          setTimeout(() => {
            DOM.passwordPad.classList.remove('pad-error');
            DOM.fartOverlay.style.display = 'none';
          }, 1500); 
          clearPad();
        }
      };

      // =========================================================
      // 이벤트 리스너 및 초기화 (Events & Init)
      // =========================================================
      
      // 시계 포맷
      DOM.hours.addEventListener('click', (e) => {
        e.stopPropagation();
        AppState.is12Hour = !AppState.is12Hour;
        updateClock();
      });

      // 폰트 크기
      DOM.minutes.addEventListener('click', (e) => {
        e.stopPropagation();
        AppState.currentSizeIndex = (AppState.currentSizeIndex + 1) % Config.sizes.length;
        DOM.timeContainer.style.fontSize = Config.sizes[AppState.currentSizeIndex];
      });

      // 폰트 종류
      DOM.seconds.addEventListener('click', (e) => {
        e.stopPropagation();
        AppState.currentFontIndex = (AppState.currentFontIndex + 1) % Config.fonts.length;
        DOM.timeContainer.style.fontFamily = Config.fonts[AppState.currentFontIndex];
      });

      // 언어/숨김 전환
      document.getElementById('langBtn').addEventListener('click', () => {
        AppState.langMode = (AppState.langMode + 1) % 3;
        updateClock();
        renderWeather();
        renderAQI();
      });

      // 숫자 패드 표시
      document.getElementById('lockBtn').addEventListener('click', () => togglePad(true));
      
      // 숫자 패드 키보드 처리
      document.querySelectorAll('.pad-btn[data-num]').forEach(btn => {
        btn.addEventListener('click', (e) => inputPad(e.target.dataset.num));
      });
      document.getElementById('padClear').addEventListener('click', clearPad);
      document.getElementById('padSubmit').addEventListener('click', submitPad);
      document.getElementById('padClose').addEventListener('click', () => togglePad(false));

      // Wake Lock 설정
      let wakeLock = null;
      const requestWakeLock = async () => {
        if ("wakeLock" in navigator) {
          try {
            wakeLock = await navigator.wakeLock.request("screen");
            document.addEventListener("visibilitychange", async () => {
              if (wakeLock !== null && document.visibilityState === "visible") {
                wakeLock = await navigator.wakeLock.request("screen");
              }
            });
          } catch (err) {
            console.log("Wake Lock Error:", err);
          }
        }
      };

      // 앱 초기 구동
      const initApp = () => {
        startClock();
        requestWakeLock();
        updateWeather();
        updateAQI();
        // 30분마다 날씨/미세먼지 갱신
        setInterval(() => {
          updateWeather();
          updateAQI();
        }, 1800000);
      };

      window.addEventListener('DOMContentLoaded', initApp);
    </script>
  </body>
</html>
