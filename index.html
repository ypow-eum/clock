<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Mobile Landscape Clock</title>
    <!-- 구글 웹폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Orbitron:wght@400..900&family=Nunito:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 상단 정보 바 -->
    <div class="top-info-bar">
      <div class="info-item left">
        <div id="weatherDisplay" class="weather-text"></div>
        <div id="statusDisplay" class="status-mini"></div>
      </div>
      <div class="info-item right">
        <div id="aqiDisplay" class="aqi-text"></div>
      </div>
    </div>

    <!-- 메인 시계 영역 -->
    <div id="main-content">
      <div class="time-container" id="timeContainer">
        <span id="hours" title="12/24시간제 전환">00</span>
        <span id="minutes" title="폰트 정보 보려고 클릭?">00</span>
      </div>
    </div>

    <!-- 하단 컨트롤 버튼 -->
    <div class="bottom-controls">
      <button class="control-btn" id="langBtn" title="언어 전환">🌐</button>
      <button class="control-btn" id="lockBtn" title="잠금">🔒</button>
      <div id="seconds" class="seconds-hidden">00</div> <!-- ID 유지를 위해 숨김 처리 -->
    </div>

    <!-- 숫자 패드 -->
    <div class="number-pad-container" id="passwordPad">
      <div class="pad-display" id="padDisplay"></div>
      <div class="pad-row">
        <div class="pad-btn" data-num="1">1</div>
        <div class="pad-btn" data-num="2">2</div>
        <div class="pad-btn" data-num="3">3</div>
      </div>
      <div class="pad-row">
        <div class="pad-btn" data-num="4">4</div>
        <div class="pad-btn" data-num="5">5</div>
        <div class="pad-btn" data-num="6">6</div>
      </div>
      <div class="pad-row">
        <div class="pad-btn" data-num="7">7</div>
        <div class="pad-btn" data-num="8">8</div>
        <div class="pad-btn" data-num="9">9</div>
      </div>
      <div class="pad-row">
        <div class="pad-btn action" id="padClear">C</div>
        <div class="pad-btn" data-num="0">0</div>
        <div class="pad-btn action" id="padSubmit">OK</div>
      </div>
      <button class="pad-btn action close" id="padClose">닫기</button>
    </div>

    <!-- 오버레이 및 미디어 -->
    <div class="overlay" id="gifOverlay">
      <img src="0.0.gif" alt="Success" />
    </div>
    <div class="overlay" id="fartOverlay">
      <div class="rainbow-fart">🌈💨</div>
    </div>
    <audio id="successSound" src="success.mp3" preload="auto"></audio>

    <script src="script.js"></script>
  </body>
</html>
